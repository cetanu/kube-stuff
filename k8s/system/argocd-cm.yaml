apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  timeout.reconciliation: 15s
  resource.customizations: |
    apiregistration.k8s.io/APIService:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "Ignoring health check"
        return hs
