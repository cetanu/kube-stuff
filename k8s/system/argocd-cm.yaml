apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  timeout.reconciliation: 15s
  resource.customizations.health.core.oam.dev_Application: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.phase ~= nil then
        if obj.status.phase == "running" then
          hs.status = "Healthy"
        elseif obj.status.phase == "failed" then
          hs.status = "Degraded"
          hs.message = obj.status.message or ""
        end
      end
    end
    return hs
  resource.customizations.health.postgresql.cnpg.io_Cluster: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.phase ~= nil then
        if obj.status.phase == "Cluster in healthy state" then
          hs.status = "Healthy"
        elseif obj.status.phase == "Setting up primary" or obj.status.phase == "Creating primary" then
          hs.status = "Progressing"
          hs.message = obj.status.phase
        else
          hs.status = "Degraded"
          hs.message = obj.status.phase
        end
      end
    end
    return hs
