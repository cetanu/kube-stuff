apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: valheim-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/cetanu/kube-stuff.git'
    targetRevision: HEAD
    path: k8s/apps/valheim
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
