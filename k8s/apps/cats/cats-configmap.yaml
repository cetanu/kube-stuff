apiVersion: v1
kind: ConfigMap
metadata:
  name: cats-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Cat Pictures!</title>
        <style>
            body {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                background: #0f0f13;
                color: #f0f0f5;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
            }
            h1 {
                background: linear-gradient(45deg, #ff7b00, #ff007b);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                font-size: 3rem;
                margin-bottom: 20px;
            }
            img {
                max-width: 80%;
                max-height: 60vh;
                border-radius: 12px;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
                transition: transform 0.3s ease;
            }
            img:hover {
                transform: scale(1.02);
            }
            button {
                margin-top: 20px;
                padding: 12px 24px;
                font-size: 1rem;
                font-weight: 600;
                background: #ff007b;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(255, 0, 123, 0.4);
                transition: background 0.2s, transform 0.1s;
            }
            button:hover {
                background: #ff3399;
                transform: translateY(-2px);
            }
            button:active {
                transform: translateY(0);
            }
        </style>
    </head>
    <body>
        <h1>Behold, GitOps Cats! 🐱</h1>
        <img id="cat-img" src="https://cataas.com/cat" alt="A cute cat" />
        <button onclick="document.getElementById('cat-img').src = 'https://cataas.com/cat?t=' + new Date().getTime()">Gimme another cat!</button>
    </body>
    </html>
