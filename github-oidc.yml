AWSTemplateFormatVersion: '2010-09-09'
Description: 'GitHub Actions OIDC Authentication Infrastructure'

Parameters:
  GitHubOrg:
    Description: 'GitHub organization or owner (e.g., my-org)'
    Type: String
    Default: 'my-org'

  GitHubRepo:
    Description: 'GitHub repository allowed to assume the runner role (e.g., my-repo or * for all repos in org)'
    Type: String
    Default: 'my-repo'

Resources:
  GithubOidcProvider:
    Type: 'AWS::IAM::OIDCProvider'
    Properties:
      Url: 'https://token.actions.githubusercontent.com'
      ClientIdList:
        - 'sts.amazonaws.com'
      ThumbprintList:
        - '6938fd4d98bab03faadb97b34396831e3780aea1'

  GitHubActionsRunnerRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'kube-github-actions-runner'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GithubOidcProvider
            Action: 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': 'sts.amazonaws.com'
              StringLike:
                'token.actions.githubusercontent.com:sub': !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      Policies:
        - PolicyName: 'CloudFormationDeployAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudformation:CreateStack'
                  - 'cloudformation:DescribeStacks'
                  - 'cloudformation:UpdateStack'
                  - 'cloudformation:DeleteStack'
                  - 'cloudformation:DescribeStackEvents'
                  - 'cloudformation:GetTemplate'
                  - 'cloudformation:GetTemplateSummary'
                  - 'cloudformation:CreateChangeSet'
                  - 'cloudformation:DescribeChangeSet'
                  - 'cloudformation:ExecuteChangeSet'
                  - 'cloudformation:DeleteChangeSet'
                Resource:
                  - !Sub 'arn:aws:cloudformation:*:${AWS::AccountId}:stack/kube/*'
                  - !Sub 'arn:aws:cloudformation:*:${AWS::AccountId}:stack/kube'
              - Effect: Allow
                Action:
                  - 'iam:CreateRole'
                  - 'iam:DeleteRole'
                  - 'iam:GetRole'
                  - 'iam:PutRolePolicy'
                  - 'iam:DeleteRolePolicy'
                  - 'iam:GetRolePolicy'
                  - 'iam:AttachRolePolicy'
                  - 'iam:DetachRolePolicy'
                  - 'iam:CreateInstanceProfile'
                  - 'iam:DeleteInstanceProfile'
                  - 'iam:GetInstanceProfile'
                  - 'iam:AddRoleToInstanceProfile'
                  - 'iam:RemoveRoleFromInstanceProfile'
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/kube-*'
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/kube-*'
              - Effect: Allow
                Action:
                  - 'iam:PassRole'
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/kube-*'
              - Effect: Allow
                Action:
                  - 'autoscaling:CreateAutoScalingGroup'
                  - 'autoscaling:UpdateAutoScalingGroup'
                  - 'autoscaling:DeleteAutoScalingGroup'
                  - 'autoscaling:SetDesiredCapacity'
                  - 'autoscaling:TerminateInstanceInAutoScalingGroup'
                Resource:
                  - !Sub 'arn:aws:autoscaling:*:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/kube-*'
              - Effect: Allow
                Action:
                  - 'autoscaling:DescribeAutoScalingGroups'
                  - 'autoscaling:DescribeLaunchConfigurations'
                  - 'autoscaling:DescribeScalingActivities'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'ssm:PutParameter'
                  - 'ssm:DeleteParameter'
                  - 'ssm:GetParameter'
                  - 'ssm:GetParameters'
                  - 'ssm:AddTagsToResource'
                  - 'ssm:RemoveTagsFromResource'
                Resource:
                  - !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/kubeadm/*'
              - Effect: Allow
                Action:
                  - 's3:CreateBucket'
                  - 's3:DeleteBucket'
                  - 's3:PutEncryptionConfiguration'
                  - 's3:PutBucketEncryption'
                  - 's3:PutBucketPublicAccessBlock'
                  - 's3:GetBucketLocation'
                  - 's3:ListBucket'
                  - 's3:GetObject'
                  - 's3:DeleteObject'
                Resource:
                  - !Sub 'arn:aws:s3:::k8s-bootstrap-logs-${AWS::AccountId}-*'
                  - !Sub 'arn:aws:s3:::k8s-bootstrap-logs-${AWS::AccountId}-*/*'
              - Effect: Allow
                Action:
                  # VPC & Networking
                  - 'ec2:CreateVpc'
                  - 'ec2:DeleteVpc'
                  - 'ec2:DescribeVpcs'
                  - 'ec2:ModifyVpcAttribute'
                  - 'ec2:CreateSubnet'
                  - 'ec2:DeleteSubnet'
                  - 'ec2:DescribeSubnets'
                  - 'ec2:ModifySubnetAttribute'
                  - 'ec2:CreateInternetGateway'
                  - 'ec2:DeleteInternetGateway'
                  - 'ec2:DescribeInternetGateways'
                  - 'ec2:AttachInternetGateway'
                  - 'ec2:DetachInternetGateway'
                  - 'ec2:CreateRouteTable'
                  - 'ec2:DeleteRouteTable'
                  - 'ec2:DescribeRouteTables'
                  - 'ec2:AssociateRouteTable'
                  - 'ec2:DisassociateRouteTable'
                  - 'ec2:CreateRoute'
                  - 'ec2:DeleteRoute'
                  # Security Groups
                  - 'ec2:CreateSecurityGroup'
                  - 'ec2:DeleteSecurityGroup'
                  - 'ec2:DescribeSecurityGroups'
                  - 'ec2:AuthorizeSecurityGroupIngress'
                  - 'ec2:RevokeSecurityGroupIngress'
                  - 'ec2:AuthorizeSecurityGroupEgress'
                  - 'ec2:RevokeSecurityGroupEgress'
                  # Elastic IPs
                  - 'ec2:AllocateAddress'
                  - 'ec2:ReleaseAddress'
                  - 'ec2:DescribeAddresses'
                  - 'ec2:AssociateAddress'
                  - 'ec2:DisassociateAddress'
                  # Instances & Launch Templates
                  - 'ec2:RunInstances'
                  - 'ec2:TerminateInstances'
                  - 'ec2:DescribeInstances'
                  - 'ec2:DescribeInstanceStatus'
                  - 'ec2:ModifyInstanceAttribute'
                  - 'ec2:CreateLaunchTemplate'
                  - 'ec2:DeleteLaunchTemplate'
                  - 'ec2:DescribeLaunchTemplates'
                  - 'ec2:DescribeLaunchTemplateVersions'
                  # Tags
                  - 'ec2:CreateTags'
                  - 'ec2:DeleteTags'
                  # Discovery
                  - 'ec2:DescribeAvailabilityZones'
                  - 'ec2:DescribeAccountAttributes'
                  - 'ec2:DescribeKeyPairs'
                Resource: '*'
        - PolicyName: 'SSMParameterAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:GetParameter'
                Resource:
                  - !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/kubeadm/kubeconfig'
                  - !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/kubeadm/security-group-id'
        - PolicyName: 'EC2SecurityGroupAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:AuthorizeSecurityGroupIngress'
                  - 'ec2:RevokeSecurityGroupIngress'
                Resource: !Sub 'arn:aws:ec2:*:${AWS::AccountId}:security-group/*'
              - Effect: Allow
                Action:
                  - 'ec2:DescribeSecurityGroups'
                Resource: '*'

Outputs:
  GitHubActionsRunnerRoleARN:
    Description: 'ARN of the IAM Role for GitHub Actions runner to assume'
    Value: !GetAtt GitHubActionsRunnerRole.Arn
