AWSTemplateFormatVersion: '2010-09-09'
Description: 'Modern Kubernetes Cluster Provisioning using kubeadm, containerd, and Flannel.'

Parameters:
  KeyPairName:
    Description: 'Name of an existing EC2 KeyPair for SSH access to the nodes'
    Type: 'AWS::EC2::KeyPair::KeyName'

  GitHubOrg:
    Description: 'GitHub organization or owner (e.g., my-org)'
    Type: String
    Default: 'my-org'

  GitHubRepo:
    Description: 'GitHub repository allowed to assume the runner role (e.g., my-repo or * for all repos in org)'
    Type: String
    Default: 'my-repo'

Resources:
  # --- IAM CONFIGURATION FOR KUBEADM JOIN KEY EXCHANGE ---
  InstanceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
      Policies:
        - PolicyName: 'KubeadmJoinTokenExchange'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:PutParameter'
                  - 'ssm:GetParameter'
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/kubeadm/*'

  InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Roles: [!Ref InstanceRole]

  GithubOidcProvider:
    Type: 'AWS::IAM::OIDCProvider'
    Properties:
      Url: 'https://token.actions.githubusercontent.com'
      ClientIdList:
        - 'sts.amazonaws.com'
      ThumbprintList:
        - '6938fd4d98bab03faadb97b34396831e3780aea1'

  GitHubActionsRunnerRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-github-actions-runner'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GithubOidcProvider
            Action: 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': 'sts.amazonaws.com'
              StringLike:
                'token.actions.githubusercontent.com:sub': !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      Policies:
        - PolicyName: 'SSMParameterAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:GetParameter'
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/kubeadm/kubeconfig'
        - PolicyName: 'EC2SecurityGroupAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:AuthorizeSecurityGroupIngress'
                  - 'ec2:RevokeSecurityGroupIngress'
                Resource: !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/${ClusterSG}'
              - Effect: Allow
                Action:
                  - 'ec2:DescribeSecurityGroups'
                Resource: '*'

  # --- NETWORKING ---
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: '10.240.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: 'k8s-modern-vpc'}]

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
  VPCGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties: {VpcId: !Ref VPC, InternetGatewayId: !Ref InternetGateway}

  Subnet:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.240.0.0/24'
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: [{Key: Name, Value: 'k8s-modern-subnet'}]

  RouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties: {VpcId: !Ref VPC}
  DefaultRoute:
    Type: 'AWS::EC2::Route'
    DependsOn: VPCGatewayAttachment
    Properties: {RouteTableId: !Ref RouteTable, DestinationCidrBlock: '0.0.0.0/0', GatewayId: !Ref InternetGateway}
  SubnetRouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties: {SubnetId: !Ref Subnet, RouteTableId: !Ref RouteTable}

  # --- SECURITY GROUPS ---
  ClusterSG:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Allow all internal traffic, plus external SSH and Kubernetes API'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # Full internal cluster communication (Nodes talking to each other)
        - {IpProtocol: '-1', CidrIp: '10.240.0.0/24'}
        # Flannel overlay pod network communication space
        - {IpProtocol: '-1', CidrIp: '10.244.0.0/16'}
        # External management access
        - {IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: !Ref YourIP}
        - {IpProtocol: tcp, FromPort: 6443, ToPort: 6443, CidrIp: !Ref YourIP}
      SecurityGroupEgress:
        - {IpProtocol: '-1', CidrIp: '0.0.0.0/0'}

  # --- CONTROL PLANE (MASTER) ---
  ControlPlaneEIP:
    Type: 'AWS::EC2::EIP'
    Properties:
      Domain: vpc
      Tags: [{Key: Name, Value: 'control-plane-eip'}]

  ControlPlaneEIPAssociation:
    Type: 'AWS::EC2::EIPAssociation'
    Properties:
      InstanceId: !Ref ControlPlane0
      AllocationId: !GetAtt ControlPlaneEIP.AllocationId

  ControlPlane0:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: 'ami-0a59248a6294cece2' # Ubuntu 22.04 LTS (us-east-1)
      InstanceType: 't3.small' # Minimum spec for control plane
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref ClusterSG]
      SubnetId: !Ref Subnet
      PrivateIpAddress: '10.240.0.11'
      Tags: [{Key: Name, Value: 'control-plane-0'}]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Wait for Elastic IP association to settle and internet connectivity to be active
          until curl -s --connect-timeout 2 google.com > /dev/null; do
            sleep 2
          done

          # 1. Prerequisites: System networking modules for containerd/kubernetes
          cat <<EOF | tee /etc/modules-load.d/k8s.conf
          overlay
          br_netfilter
          EOF
          modprobe overlay
          modprobe br_netfilter

          cat <<EOF | tee /etc/sysctl.d/99-kubernetes-cri.conf
          net.bridge.bridge-nf-call-iptables  = 1
          net.ipv4.ip_forward                 = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          EOF
          sysctl --system

          # 2. Install containerd runtime
          apt-get update && apt-get install -y containerd
          mkdir -p /etc/containerd
          containerd config default | tee /etc/containerd/config.toml
          sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
          systemctl restart containerd

          # 3. Install kubeadm, kubelet, kubectl, awscli and helm
          apt-get update && apt-get install -y apt-transport-https ca-certificates curl gpg
          curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
          apt-get update && apt-get install -y kubelet kubeadm kubectl awscli
          apt-mark hold kubelet kubeadm kubectl

          # Install Helm
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          # 4. Initialize control plane using kubeadm
          # --pod-network-cidr=10.244.0.0/16 is explicitly required for Flannel CNI
          # Include Elastic IP in certificate SANs so kubectl can connect externally
          kubeadm init --apiserver-advertise-address=10.240.0.11 --pod-network-cidr=10.244.0.0/16 --apiserver-cert-extra-sans=10.240.0.11,${ControlPlaneEIP}

          # 5. Configure administrative kubeconfig access
          mkdir -p /home/ubuntu/.kube
          cp -i /etc/kubernetes/admin.conf /home/ubuntu/.kube/config
          chown -R ubuntu:ubuntu /home/ubuntu/.kube

          # Set KUBECONFIG for the current root session
          export KUBECONFIG=/etc/kubernetes/admin.conf

          # 6. Apply Flannel CNI so nodes can become 'Ready'
          kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml

          # Wait for API server and CNI to be ready
          sleep 15

          # Install aws-ebs-csi-driver via Helm
          helm repo add aws-ebs-csi-driver https://kubernetes-sigs.github.io/aws-ebs-csi-driver
          helm repo update
          helm install aws-ebs-csi-driver aws-ebs-csi-driver/aws-ebs-csi-driver --namespace kube-system

          # 7. Generate external kubeconfig (pointing to Elastic IP) and upload to SSM Parameter Store
          cp /etc/kubernetes/admin.conf /tmp/kubeconfig.yaml
          sed -i "s/10.240.0.11/${ControlPlaneEIP}/g" /tmp/kubeconfig.yaml
          aws ssm put-parameter --name "/kubeadm/kubeconfig" --value "$(cat /tmp/kubeconfig.yaml)" --type "String" --tier "Intelligent-Tiering" --overwrite --region ${AWS::Region}

          # 8. Generate and store the worker cluster-join command dynamically into SSM
          JOIN_CMD=$(kubeadm token create --print-join-command)
          aws ssm put-parameter --name "/kubeadm/join-command" --value "$JOIN_CMD" --type "String" --overwrite --region ${AWS::Region}

          # 9. Create maintenance script to renew certificates and update SSM kubeconfig weekly
          cat <<'EOF' > /usr/local/bin/k8s-maintenance.sh
          #!/bin/bash
          set -e

          echo "Starting Kubernetes maintenance and cert renewal..."

          # Renew all certificates
          kubeadm certs renew all

          # Restart kubelet to reload certificates
          systemctl restart kubelet

          # Wait for API server to become ready again
          until kubectl get nodes --raw /healthz >/dev/null 2>&1; do
            sleep 2
          done

          # Update ubuntu user's kubeconfig
          cp -i /etc/kubernetes/admin.conf /home/ubuntu/.kube/config
          chown ubuntu:ubuntu /home/ubuntu/.kube/config

          # Update the external kubeconfig in SSM Parameter Store
          cp /etc/kubernetes/admin.conf /tmp/kubeconfig.yaml
          sed -i "s/10.240.0.11/${ControlPlaneEIP}/g" /tmp/kubeconfig.yaml
          aws ssm put-parameter --name "/kubeadm/kubeconfig" --value "$(cat /tmp/kubeconfig.yaml)" --type "String" --tier "Intelligent-Tiering" --overwrite --region ${AWS::Region}

          echo "Kubernetes maintenance completed successfully."
          EOF

          chmod +x /usr/local/bin/k8s-maintenance.sh

          # Register the cronjob to run every Sunday at midnight
          echo "0 0 * * 0 root /usr/local/bin/k8s-maintenance.sh >> /var/log/k8s-maintenance.log 2>&1" | tee /etc/cron.d/k8s-maintenance

  # --- WORKER NODE 0 ---
  Worker0:
    Type: 'AWS::EC2::Instance'
    DependsOn: ControlPlane0
    Properties:
      ImageId: 'ami-0a59248a6294cece2'
      InstanceType: 't3.small'
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref ClusterSG]
      SubnetId: !Ref Subnet
      PrivateIpAddress: '10.240.0.20'
      Tags: [{Key: Name, Value: 'worker-0'}]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Same runtime setup as control-plane
          cat <<EOF | tee /etc/modules-load.d/k8s.conf
          overlay
          br_netfilter
          EOF
          modprobe overlay
          modprobe br_netfilter

          cat <<EOF | tee /etc/sysctl.d/99-kubernetes-cri.conf
          net.bridge.bridge-nf-call-iptables  = 1
          net.ipv4.ip_forward                 = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          EOF
          sysctl --system

          apt-get update && apt-get install -y containerd
          mkdir -p /etc/containerd
          containerd config default | tee /etc/containerd/config.toml
          sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
          systemctl restart containerd

          apt-get update && apt-get install -y apt-transport-https ca-certificates curl gpg
          curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
          apt-get update && apt-get install -y kubelet kubeadm awscli
          apt-mark hold kubelet kubeadm

          # Pull the active cluster join token out of SSM and run it
          until JOIN_CMD=$(aws ssm get-parameter --name "/kubeadm/join-command" --query "Parameter.Value" --output text --region ${AWS::Region} 2>/dev/null); do
            sleep 10
          done
          eval "$JOIN_CMD"

  # --- WORKER NODE 1 ---
  Worker1:
    Type: 'AWS::EC2::Instance'
    DependsOn: ControlPlane0
    Properties:
      ImageId: 'ami-0a59248a6294cece2'
      InstanceType: 't3.small'
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref ClusterSG]
      SubnetId: !Ref Subnet
      PrivateIpAddress: '10.240.0.21'
      Tags: [{Key: Name, Value: 'worker-1'}]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          cat <<EOF | tee /etc/modules-load.d/k8s.conf
          overlay
          br_netfilter
          EOF
          modprobe overlay
          modprobe br_netfilter

          cat <<EOF | tee /etc/sysctl.d/99-kubernetes-cri.conf
          net.bridge.bridge-nf-call-iptables  = 1
          net.ipv4.ip_forward                 = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          EOF
          sysctl --system

          apt-get update && apt-get install -y containerd
          mkdir -p /etc/containerd
          containerd config default | tee /etc/containerd/config.toml
          sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
          systemctl restart containerd

          apt-get update && apt-get install -y apt-transport-https ca-certificates curl gpg
          curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
          apt-get update && apt-get install -y kubelet kubeadm awscli
          apt-mark hold kubelet kubeadm

          until JOIN_CMD=$(aws ssm get-parameter --name "/kubeadm/join-command" --query "Parameter.Value" --output text --region ${AWS::Region} 2>/dev/null); do
            sleep 10
          done
          eval "$JOIN_CMD"

Outputs:
  GitHubActionsRunnerRoleARN:
    Description: 'ARN of the IAM Role for GitHub Actions runner to assume'
    Value: !GetAtt GitHubActionsRunnerRole.Arn
