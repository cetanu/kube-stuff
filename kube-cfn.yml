AWSTemplateFormatVersion: '2010-09-09'
Description: 'Modern Kubernetes Cluster Provisioning using kubeadm, containerd, and Flannel.'

Parameters:
  KeyPairName:
    Description: 'Name of an existing EC2 KeyPair for SSH access to the nodes'
    Type: 'AWS::EC2::KeyPair::KeyName'

  YourIP:
    Description: 'The CIDR block allowed to access SSH and the K8s API (e.g., 203.0.113.50/32)'
    Type: String
    Default: '0.0.0.0/0'

  GitHubOrg:
    Description: 'GitHub organization or owner (e.g., my-org)'
    Type: String
    Default: 'my-org'

  GitHubRepo:
    Description: 'GitHub repository allowed to assume the runner role (e.g., my-repo or * for all repos in org)'
    Type: String
    Default: 'my-repo'

Resources:
  # --- IAM CONFIGURATION FOR KUBEADM JOIN KEY EXCHANGE ---
  InstanceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
      Policies:
        - PolicyName: 'KubeadmJoinTokenExchange'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:PutParameter'
                  - 'ssm:GetParameter'
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/kubeadm/*'
              - Effect: Allow
                Action:
                  - 'ec2:DescribeTags'
                Resource: '*'
        - PolicyName: 'AWSCloudProvider'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'autoscaling:DescribeAutoScalingGroups'
                  - 'autoscaling:DescribeLaunchConfigurations'
                  - 'autoscaling:DescribeTags'
                  - 'ec2:DescribeInstances'
                  - 'ec2:DescribeRegions'
                  - 'ec2:DescribeRouteTables'
                  - 'ec2:DescribeSecurityGroups'
                  - 'ec2:DescribeSubnets'
                  - 'ec2:DescribeVolumes'
                  - 'ec2:DescribeAvailabilityZones'
                  - 'ec2:DescribeVpcs'
                  - 'ec2:CreateSecurityGroup'
                  - 'ec2:CreateTags'
                  - 'ec2:CreateVolume'
                  - 'ec2:ModifyInstanceAttribute'
                  - 'ec2:ModifyVolume'
                  - 'ec2:AttachVolume'
                  - 'ec2:AuthorizeSecurityGroupIngress'
                  - 'ec2:CreateRoute'
                  - 'ec2:DeleteRoute'
                  - 'ec2:DeleteSecurityGroup'
                  - 'ec2:DeleteVolume'
                  - 'ec2:DetachVolume'
                  - 'ec2:RevokeSecurityGroupIngress'
                  - 'elasticloadbalancing:*'
                Resource: '*'

  InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Roles: [!Ref InstanceRole]

  GithubOidcProvider:
    Type: 'AWS::IAM::OIDCProvider'
    Properties:
      Url: 'https://token.actions.githubusercontent.com'
      ClientIdList:
        - 'sts.amazonaws.com'
      ThumbprintList:
        - '6938fd4d98bab03faadb97b34396831e3780aea1'

  GitHubActionsRunnerRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-github-actions-runner'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GithubOidcProvider
            Action: 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': 'sts.amazonaws.com'
              StringLike:
                'token.actions.githubusercontent.com:sub': !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      Policies:
        - PolicyName: 'CloudFormationDeployAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudformation:*'
                  - 'ec2:*'
                  - 'iam:*'
                  - 'ssm:*'
                Resource: '*'
        - PolicyName: 'SSMParameterAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:GetParameter'
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/kubeadm/kubeconfig'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/kubeadm/security-group-id'
        - PolicyName: 'EC2SecurityGroupAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:AuthorizeSecurityGroupIngress'
                  - 'ec2:RevokeSecurityGroupIngress'
                Resource: !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/${ClusterSG}'
              - Effect: Allow
                Action:
                  - 'ec2:DescribeSecurityGroups'
                Resource: '*'

  # --- NETWORKING ---
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: '10.240.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - {Key: Name, Value: 'k8s-modern-vpc'}
        - {Key: 'kubernetes.io/cluster/kubernetes', Value: 'owned'}

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
  VPCGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties: {VpcId: !Ref VPC, InternetGatewayId: !Ref InternetGateway}

  Subnet:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.240.0.0/24'
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - {Key: Name, Value: 'k8s-modern-subnet'}
        - {Key: 'kubernetes.io/cluster/kubernetes', Value: 'owned'}
        - {Key: 'kubernetes.io/role/elb', Value: '1'}

  RouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties: {VpcId: !Ref VPC}
  DefaultRoute:
    Type: 'AWS::EC2::Route'
    DependsOn: VPCGatewayAttachment
    Properties: {RouteTableId: !Ref RouteTable, DestinationCidrBlock: '0.0.0.0/0', GatewayId: !Ref InternetGateway}
  SubnetRouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties: {SubnetId: !Ref Subnet, RouteTableId: !Ref RouteTable}

  # --- SECURITY GROUPS ---
  ClusterSG:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Allow all internal traffic, plus external SSH and Kubernetes API'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # Full internal cluster communication (Nodes talking to each other)
        - {IpProtocol: '-1', CidrIp: '10.240.0.0/24'}
        # Flannel overlay pod network communication space
        - {IpProtocol: '-1', CidrIp: '10.244.0.0/16'}
        # External management access
        - {IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: !Ref YourIP}
        # Valheim standard UDP ports
        - {IpProtocol: udp, FromPort: 2456, ToPort: 2457, CidrIp: '0.0.0.0/0'}
        # Kubernetes NodePorts (UDP) - required if Envoy provisions a NodePort Service
        - {IpProtocol: udp, FromPort: 30000, ToPort: 32767, CidrIp: '0.0.0.0/0'}
        # Kubernetes NodePorts (TCP)
        - {IpProtocol: tcp, FromPort: 30000, ToPort: 32767, CidrIp: '0.0.0.0/0'}
      SecurityGroupEgress:
        - {IpProtocol: '-1', CidrIp: '0.0.0.0/0'}

  ClusterSGParameter:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: '/kubeadm/security-group-id'
      Type: 'String'
      Value: !Ref ClusterSG
      Description: 'Security Group ID of the Kubernetes Cluster'

  # --- CONTROL PLANE (MASTER) ---
  ControlPlaneEIP:
    Type: 'AWS::EC2::EIP'
    Properties:
      Domain: vpc
      Tags: [{Key: Name, Value: 'control-plane-eip'}]

  ControlPlaneEIPAssociation:
    Type: 'AWS::EC2::EIPAssociation'
    Properties:
      InstanceId: !Ref ControlPlane0
      AllocationId: !GetAtt ControlPlaneEIP.AllocationId

  ControlPlane0:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: 'ami-0a59248a6294cece2' # Ubuntu 22.04 LTS (us-east-1)
      InstanceType: 't3.small' # Minimum spec for control plane
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref ClusterSG]
      SubnetId: !Ref Subnet
      PrivateIpAddress: '10.240.0.11'
      Tags: [
        {Key: Name, Value: 'control-plane-0'},
        {Key: 'kubernetes.io/cluster/kubernetes', Value: 'owned'},
        {Key: Role, Value: 'controlplane'},
      ]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # ------------- Network check --------------
          until curl -s --connect-timeout 2 aws.amazon.com > /dev/null; do
            sleep 2
          done

          # ------------- Bootstrap SaltStack --------------
          apt-get update && apt-get install -y curl git awscli jq
          curl -L https://bootstrap.saltproject.io -o install_salt.sh
          sh install_salt.sh

          git clone https://github.com/${GitHubOrg}/${GitHubRepo}.git /srv/salt-repo

          # -------------- Set up Salt grains --------------
          TOKEN=$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" -s)
          INSTANCE_ID=$(curl -H "X-aws-ec2-metadata-token: $TOKEN" -s http://169.254.169.254/latest/meta-data/instance-id)
          ROLE=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$INSTANCE_ID" "Name=key,Values=Role" --region ${AWS::Region} --query "Tags[0].Value" --output text)
          echo "role: ${ROLE}" > /etc/salt/grains

          # -------------- Initial Bootstrap Run --------------
          salt-call --local --file-root=/srv/salt-repo/salt state.apply pillar="{aws_region: '${AWS::Region}', eip: '${ControlPlaneEIP}'}"

  # --- WORKER NODE 0 ---
  Worker0:
    Type: 'AWS::EC2::Instance'
    DependsOn: ControlPlane0
    Properties:
      ImageId: 'ami-0a59248a6294cece2'
      InstanceType: 't3.small'
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref ClusterSG]
      SubnetId: !Ref Subnet
      PrivateIpAddress: '10.240.0.20'
      Tags: [
        {Key: Name, Value: 'worker-0'},
        {Key: 'kubernetes.io/cluster/kubernetes', Value: 'owned'},
        {Key: Role, Value: 'worker'}
      ]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # ------------- Network check --------------
          until curl -s --connect-timeout 2 aws.amazon.com > /dev/null; do
            sleep 2
          done

          # ------------- Bootstrap SaltStack --------------
          apt-get update && apt-get install -y curl git awscli jq
          curl -L https://bootstrap.saltproject.io -o install_salt.sh
          sh install_salt.sh

          git clone https://github.com/${GitHubOrg}/${GitHubRepo}.git /srv/salt-repo

          # -------------- Set up Salt grains --------------
          TOKEN=$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" -s)
          INSTANCE_ID=$(curl -H "X-aws-ec2-metadata-token: $TOKEN" -s http://169.254.169.254/latest/meta-data/instance-id)
          ROLE=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$INSTANCE_ID" "Name=key,Values=Role" --region ${AWS::Region} --query "Tags[0].Value" --output text)
          echo "role: ${ROLE}" > /etc/salt/grains

          # -------------- Initial Bootstrap Run --------------
          salt-call --local --file-root=/srv/salt-repo/salt state.apply pillar="{aws_region: '${AWS::Region}', eip: '${ControlPlaneEIP}'}"

  # --- WORKER NODE 1 ---
  Worker1:
    Type: 'AWS::EC2::Instance'
    DependsOn: ControlPlane0
    Properties:
      ImageId: 'ami-0a59248a6294cece2'
      InstanceType: 't3.small'
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref ClusterSG]
      SubnetId: !Ref Subnet
      PrivateIpAddress: '10.240.0.21'
      Tags: [
        {Key: Name, Value: 'worker-1'},
        {Key: 'kubernetes.io/cluster/kubernetes', Value: 'owned'},
        {Key: Role, Value: 'worker'}
      ]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # ------------- Network check --------------
          until curl -s --connect-timeout 2 aws.amazon.com > /dev/null; do
            sleep 2
          done

          # ------------- Bootstrap SaltStack --------------
          apt-get update && apt-get install -y curl git awscli jq
          curl -L https://bootstrap.saltproject.io -o install_salt.sh
          sh install_salt.sh

          git clone https://github.com/${GitHubOrg}/${GitHubRepo}.git /srv/salt-repo

          # -------------- Set up Salt grains --------------
          TOKEN=$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" -s)
          INSTANCE_ID=$(curl -H "X-aws-ec2-metadata-token: $TOKEN" -s http://169.254.169.254/latest/meta-data/instance-id)
          ROLE=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$INSTANCE_ID" "Name=key,Values=Role" --region ${AWS::Region} --query "Tags[0].Value" --output text)
          echo "role: ${ROLE}" > /etc/salt/grains

          # -------------- Initial Bootstrap Run --------------
          salt-call --local --file-root=/srv/salt-repo/salt state.apply pillar="{aws_region: '${AWS::Region}', eip: '${ControlPlaneEIP}'}"

Outputs:
  GitHubActionsRunnerRoleARN:
    Description: 'ARN of the IAM Role for GitHub Actions runner to assume'
    Value: !GetAtt GitHubActionsRunnerRole.Arn
