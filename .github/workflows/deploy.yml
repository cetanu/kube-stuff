name: Provision stack

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  AWS_ROLE_TO_ASSUME: arn:aws:iam::626210706774:role/kube-github-actions-runner

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Upsert S3 State Bucket
        run: |
          BACKEND_URL="${{ secrets.PULUMI_BACKEND_URL }}"
          if [[ "$BACKEND_URL" =~ ^s3://([^/]+) ]]; then
            BUCKET_NAME="${BASH_REMATCH[1]}"
            echo "Bucket name extracted: $BUCKET_NAME"
            if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
              echo "Bucket $BUCKET_NAME already exists."
            else
              echo "Bucket $BUCKET_NAME does not exist. Creating..."
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "${{ env.AWS_REGION }}" --create-bucket-configuration LocationConstraint="${{ env.AWS_REGION }}"
              echo "Bucket $BUCKET_NAME created successfully."
            fi
          else
            echo "Backend URL is not an S3 URI ($BACKEND_URL). Skipping bucket upsert."
            exit 1
          fi

      - name: Run Pulumi Up
        id: pulumi
        uses: pulumi/actions@v4
        with:
          command: up
          stack-name: default
          cloud-url: ${{ secrets.PULUMI_BACKEND_URL }}
          upsert: true
          suppress-progress: true
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Save Kubeconfig and Talosconfig
        run: |
          pulumi login ${{ secrets.PULUMI_BACKEND_URL }}
          pulumi stack output kubeconfig --show-secrets --stack default > ./kubeconfig
          pulumi stack output talosconfig --show-secrets --stack default > ./talosconfig
          chmod 600 ./kubeconfig ./talosconfig
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}


      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'

      - name: Wait for Kubernetes API Server to be ready
        run: |
          echo "Waiting for Kubernetes API server '/readyz' endpoint..."
          for i in {1..30}; do
            if kubectl --kubeconfig ./kubeconfig --request-timeout=5s get --raw='/readyz' &>/dev/null; then
              echo "Kubernetes API server is ready!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          echo "Timeout waiting for Kubernetes API server"
          exit 1

      - name: Bootstrap Cilium CNI
        run: |
          helm repo add cilium https://helm.cilium.io/
          helm repo update
          helm upgrade --install cilium oci://quay.io/cilium/charts/cilium \
            --namespace kube-system \
            --set ipam.mode=kubernetes \
            --set kubeProxyReplacement=true \
            --set cgroup.autoMount.enabled=false \
            --set cgroup.hostRoot=/sys/fs/cgroup \
            --set securityContext.capabilities.ciliumAgent="{CHOWN,KILL,NET_ADMIN,NET_RAW,IPC_LOCK,SYS_ADMIN,SYS_RESOURCE,DAC_OVERRIDE,FOWNER,SETGID,SETUID}" \
            --set securityContext.capabilities.cleanCiliumState="{NET_ADMIN,SYS_ADMIN,SYS_RESOURCE}" \
            --kubeconfig ./kubeconfig

      - name: Install Gateway API CRDs
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml --kubeconfig ./kubeconfig --server-side

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --kubeconfig ./kubeconfig || true
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --kubeconfig ./kubeconfig --server-side

      - name: Deploy Bootstrapping Manifests
        run: |
          kubectl apply -f k8s/bootstrap/namespaces.yaml --kubeconfig ./kubeconfig
          kubectl apply -f k8s/bootstrap/root-application.yaml --kubeconfig ./kubeconfig

      - name: Dump Debug Logs on Failure
        if: failure()
        run: |
          echo "=== 1. Kubernetes API & Pod Status ==="
          if [ -f ./kubeconfig ]; then
            kubectl get nodes -o wide --kubeconfig ./kubeconfig --request-timeout=5s || true
            kubectl get pods -A -o wide --kubeconfig ./kubeconfig --request-timeout=5s || true
          else
            echo "kubeconfig not found"
          fi

          echo "=== 2. Downloading talosctl ==="
          sudo curl -sL https://github.com/siderolabs/talos/releases/latest/download/talosctl-linux-amd64 -o /usr/local/bin/talosctl
          sudo chmod +x /usr/local/bin/talosctl

          echo "=== 3. Talos Node Status ==="
          if [ -f ./talosconfig ]; then
            ENDPOINT=$(grep -A 1 'endpoints:' ./talosconfig | tail -n 1 | awk '{print $2}')
            NODE_IP=$(grep -A 1 'nodes:' ./talosconfig | tail -n 1 | awk '{print $2}')
            echo "Detected Endpoint: $ENDPOINT"
            echo "Detected Node IP: $NODE_IP"
            if [ -n "$NODE_IP" ] && [ -n "$ENDPOINT" ]; then
              # Try to map internal node hostname to the Load Balancer IP to satisfy TLS validation
              LB_IP=$(getent hosts "$ENDPOINT" | awk '{print $1; exit}')
              echo "Resolved Load Balancer IP: $LB_IP"
              if [ -n "$LB_IP" ]; then
                echo "$LB_IP ip-10-240-0-11" | sudo tee -a /etc/hosts
                echo "Mapped ip-10-240-0-11 to $LB_IP in /etc/hosts"
                echo "--- Running authenticated diagnostics ---"
                talosctl --talosconfig ./talosconfig service -n ip-10-240-0-11 -e ip-10-240-0-11 || true
                talosctl --talosconfig ./talosconfig containers -n ip-10-240-0-11 -e ip-10-240-0-11 || true
                talosctl --talosconfig ./talosconfig dmesg -n ip-10-240-0-11 -e ip-10-240-0-11 | tail -n 100 || true
              fi

              # Fall back to insecure mode commands in case the node is still in maintenance mode
              echo "--- Running maintenance mode diagnostics ---"
              talosctl version -n "$NODE_IP" -e "$ENDPOINT" --insecure || true
            else
              echo "Could not detect endpoint or node IP from talosconfig"
            fi
          else
            echo "talosconfig not found"
          fi





