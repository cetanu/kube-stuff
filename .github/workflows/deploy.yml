name: Deploy to Kubernetes Control Plane

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  AWS_ROLE_TO_ASSUME: arn:aws:iam::626210706774:role/kube-github-actions-runner

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file kube-cfn.yml \
            --stack-name kube \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              GitHubOrg=${{ github.repository_owner }} \
              GitHubRepo=${{ github.event.repository.name }} \
              KeyPairName=kubeworld-except-it-works-this-time \
            --no-fail-on-empty-changeset

      - name: Fetch Security Group ID from SSM
        run: |
          SG_ID=$(aws ssm get-parameter --name "/kubeadm/security-group-id" --query "Parameter.Value" --output text)
          echo "AWS_SG_ID=${SG_ID}" >> $GITHUB_ENV

      - name: Discover Runner Public IP
        id: get-ip
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com/)
          echo "ip=${RUNNER_IP}" >> $GITHUB_OUTPUT
          echo "Runner Public IP allocated: ${RUNNER_IP}"

      - name: Open Firewall Port (Ingress Whitelist)
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ env.AWS_SG_ID }} \
            --protocol tcp \
            --port 6443 \
            --cidr ${{ steps.get-ip.outputs.ip }}/32

      - name: Wait for Kubernetes Control Plane to Initialize
        run: |
          echo "Waiting for kubeconfig to be published to SSM by the control plane..."
          until aws ssm get-parameter --name "/kubeadm/kubeconfig" > /dev/null 2>&1; do
            sleep 15
          done

      - name: Wait for Control Plane to Apply Latest States
        run: |
          echo "Waiting for control plane to apply commit ${{ github.sha }}..."
          until [ "$(aws ssm get-parameter --name "/kubeadm/salt-status" --query "Parameter.Value" --output text 2>/dev/null)" == "${{ github.sha }}" ]; do
            sleep 15
          done

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          aws ssm get-parameter --name "/kubeadm/kubeconfig" --query "Parameter.Value" --output text > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Generate Helm and Addon Manifests
        run: |
          mkdir -p k8s/manifests
          
          # Fetch Pod CIDR from CloudFormation
          POD_CIDR=$(aws cloudformation describe-stacks --stack-name kube --query "Stacks[0].Parameters[?ParameterKey=='PodCIDR'].ParameterValue" --output text)
          if [ -z "$POD_CIDR" ]; then POD_CIDR="10.244.0.0/16"; fi
          
          # Flannel
          curl -sL https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml | sed "s|10.244.0.0/16|${POD_CIDR}|g" > k8s/manifests/kube-flannel.yaml
          
          # Namespaces
          echo -e "apiVersion: v1\nkind: Namespace\nmetadata:\n  name: envoy-gateway-system" > k8s/manifests/namespaces.yaml
          
          # Add Helm repos
          helm repo add aws-cloud-controller-manager https://kubernetes.github.io/cloud-provider-aws
          helm repo add aws-ebs-csi-driver https://kubernetes-sigs.github.io/aws-ebs-csi-driver
          helm repo add wiremind https://wiremind.github.io/wiremind-helm-charts
          helm repo update
          
          # Template AWS CCM
          helm template aws-cloud-controller-manager aws-cloud-controller-manager/aws-cloud-controller-manager \
            --namespace kube-system \
            --set hostNetwork=true \
            --set hostNetworking=true \
            --set "args[0]=--v=2" \
            --set "args[1]=--cloud-provider=aws" \
            --set "args[2]=--cluster-name=kubernetes" \
            --set "args[3]=--allocate-node-cidrs=true" \
            --set "args[4]=--cluster-cidr=${POD_CIDR}" \
            --set "args[5]=--configure-cloud-routes=false" > k8s/manifests/aws-ccm.yaml
            
          # Template EBS CSI
          helm template aws-ebs-csi-driver aws-ebs-csi-driver/aws-ebs-csi-driver \
            --namespace kube-system > k8s/manifests/aws-ebs-csi.yaml
            
          # Template Gateway API CRDs
          helm template gateway-api-crds wiremind/gateway-api-crds --version 1.5.1 > k8s/manifests/gateway-api-crds.yaml
          
          # Template Envoy Gateway
          helm pull oci://docker.io/envoyproxy/gateway-helm --version v1.8.1 --untar
          helm template eg ./gateway-helm \
            --namespace envoy-gateway-system > k8s/manifests/envoy-gateway.yaml

      - name: Deploy Manifests
        run: |
          kubectl apply -f k8s/ --recursive --validate=false
          kubectl patch ds aws-cloud-controller-manager -n kube-system -p '{"spec":{"template":{"spec":{"hostNetwork":true}}}}' || true

      - name: Close Firewall Port (Revoke Access)
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ env.AWS_SG_ID }} \
            --protocol tcp \
            --port 6443 \
            --cidr ${{ steps.get-ip.outputs.ip }}/32
