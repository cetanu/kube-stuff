name: Provision stack

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  AWS_ROLE_TO_ASSUME: arn:aws:iam::626210706774:role/kube-github-actions-runner

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Upsert S3 State Bucket
        run: |
          BACKEND_URL="${{ secrets.PULUMI_BACKEND_URL }}"
          if [[ "$BACKEND_URL" =~ ^s3://([^/]+) ]]; then
            BUCKET_NAME="${BASH_REMATCH[1]}"
            echo "Bucket name extracted: $BUCKET_NAME"
            if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
              echo "Bucket $BUCKET_NAME already exists."
            else
              echo "Bucket $BUCKET_NAME does not exist. Creating..."
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "${{ env.AWS_REGION }}" --create-bucket-configuration LocationConstraint="${{ env.AWS_REGION }}"
              echo "Bucket $BUCKET_NAME created successfully."
            fi
          else
            echo "Backend URL is not an S3 URI ($BACKEND_URL). Skipping bucket upsert."
            exit 1
          fi

      - name: Get Runner IP
        id: ip
        run: echo "ip=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Run Pulumi Up
        id: pulumi
        uses: pulumi/actions@v4
        with:
          command: up
          stack-name: default
          cloud-url: ${{ secrets.PULUMI_BACKEND_URL }}
          upsert: true
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          PULUMI_CONFIG: '{"kube-stuff:runnerIP":"${{ steps.ip.outputs.ip }}/32"}'

      - name: Save Kubeconfig and Talosconfig
        run: |
          pulumi stack output kubeconfig --show-secrets --stack default --cloud-url ${{ secrets.PULUMI_BACKEND_URL }} > ./kubeconfig
          pulumi stack output talosconfig --show-secrets --stack default --cloud-url ${{ secrets.PULUMI_BACKEND_URL }} > ./talosconfig
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
