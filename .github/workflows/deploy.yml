name: Deploy to Kubernetes Control Plane

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "ap-southeast-2"
  AWS_ROLE_TO_ASSUME: "arn:aws:iam::626210706774:role/kube-gh-actions"
  EC2_INSTANCE_IP: "13.211.167.107"
  AWS_SG_ID: sg-05c187d7e09f32f89

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Discover Runner Public IP
        id: get-ip
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com/)
          echo "ip=${RUNNER_IP}" >> $GITHUB_OUTPUT
          echo "Runner Public IP allocated: ${RUNNER_IP}"

      - name: Open Firewall Port (Ingress Whitelist)
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ env.AWS_SG_ID }} \
            --protocol tcp \
            --port 6443 \
            --cidr ${{ steps.get-ip.outputs.ip }}/32

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          # If your kubeconfig uses the internal EC2 IP, you might need to patch it to use the public IP/DNS here
          sed -i "s|https://10.240.0.11:6443|https://${{ env.EC2_INSTANCE_IP }}:6443|g" ~/.kube/config

      - name: Deploy Manifests
        run: |
          kubectl apply -f k8s/ --recursive

      - name: Close Firewall Port (Revoke Access)
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ env.AWS_SG_ID }} \
            --protocol tcp \
            --port 6443 \
            --cidr ${{ steps.get-ip.outputs.ip }}/32
